<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Paziente | Prototype Clinic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');
    body { font-family: 'Geist', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-12 text-center border border-slate-100">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-50 text-blue-600 mb-8">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
    </div>
    <h1 class="text-3xl font-black mb-4 tracking-tight text-slate-900 uppercase">Dashboard Paziente</h1>
    <p class="text-slate-500 mb-10 leading-relaxed">
      Bentornato! Questa è l'area riservata dove potrai gestire le tue prenotazioni, i tuoi documenti e comunicare con la clinica in modo sicuro.
    </p>
    <div class="bg-blue-600/5 border border-blue-100 rounded-2xl p-6 text-blue-900 font-medium mb-8">
      Siamo al lavoro per attivare tutte le funzionalità avanzate del tuo account.
    </div>
    <button onclick="window.close()" class="text-slate-400 hover:text-slate-600 font-semibold transition-colors">
      Chiudi questa finestra
    </button>
  </div>
</body>
</html>
